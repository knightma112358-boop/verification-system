<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>人员验证系统</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #4F46E5;
      --success: #059669;
      --danger: #DC2626;
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-secondary: #64748B;
      --border: #E2E8F0;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      width: 100%; background: var(--primary); color: #fff;
      text-align: center; padding: 20px 16px 18px;
      box-shadow: 0 2px 8px rgba(79,70,229,.25);
    }
    .header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: .02em; }
    .header .sub { font-size: .8rem; opacity: .8; margin-top: 4px; }
    .tabs {
      display: flex; width: calc(100% - 32px); max-width: 420px;
      margin: 16px auto 0; background: var(--card); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }
    .tab {
      flex: 1; text-align: center; padding: 12px 0; font-size: .95rem;
      font-weight: 600; color: var(--text-secondary); cursor: pointer;
      transition: all .2s; border-bottom: 3px solid transparent;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #EEF2FF; }
    .main { width: 100%; max-width: 420px; padding: 0 16px; flex: 1; }
    .page { display: none; margin-top: 20px; }
    .page.active { display: block; }
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 24px 20px; box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: .88rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 13px 14px; font-size: 1rem;
      border: 1.5px solid var(--border); border-radius: 10px; outline: none;
      transition: border-color .2s; background: #FAFBFC; color: var(--text);
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .btn {
      display: block; width: 100%; padding: 14px; font-size: 1.05rem;
      font-weight: 700; border: none; border-radius: 10px; cursor: pointer;
      transition: all .2s; letter-spacing: .04em; text-align: center;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
    .btn-sm { padding: 8px 16px; font-size: .82rem; width: auto; display: inline-block; }

    .result {
      margin-top: 24px; padding: 20px; border-radius: var(--radius);
      text-align: center; display: none; animation: fadeIn .3s ease;
    }
    .result.show { display: block; }
    .result.authorized { background: #ECFDF5; border: 2px solid #6EE7B7; }
    .result.expired { background: #FFF7ED; border: 2px solid #FDBA74; }
    .result.unauthorized { background: #FEF2F2; border: 2px solid #FECACA; }
    .result .icon { font-size: 3rem; margin-bottom: 8px; }
    .result .status { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .result.authorized .status { color: var(--success); }
    .result.expired .status { color: #C2410C; }
    .result.unauthorized .status { color: var(--danger); }
    .result .detail { font-size: .85rem; color: var(--text-secondary); margin-top: 6px; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .person-list { list-style: none; max-height: 50vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .person-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .person-item:last-child { border-bottom: none; }
    .person-info { flex: 1; }
    .person-info .p-name { font-weight: 600; font-size: .95rem; }
    .person-info .p-meta { font-size: .78rem; color: var(--text-secondary); }
    .person-item .btn-sm { flex-shrink: 0; }
    .stats { text-align: center; font-size: .85rem; color: var(--text-secondary); margin-bottom: 12px; }
    .stats strong { color: var(--primary); font-size: 1.2rem; }

    .batch-area {
      width: 100%; min-height: 120px; font-size: .85rem; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px; resize: vertical; font-family: inherit;
      outline: none; margin-bottom: 12px; background: #FAFBFC;
    }
    .batch-area:focus { border-color: var(--primary); }
    .batch-hint { font-size: .75rem; color: var(--text-secondary); margin-bottom: 12px; }

    .token-setup { margin-bottom: 14px; }
    .token-setup input { font-size: .8rem; padding: 8px 10px; width: 100%; border:1.5px solid var(--border); border-radius:8px; outline:none; }
    .token-setup input:focus { border-color: var(--primary); }
    .token-hint { font-size: .72rem; color: var(--text-secondary); margin-top: 4px; }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1E293B; color: #fff; padding: 12px 24px; border-radius: 8px;
      font-size: .9rem; z-index: 999; pointer-events: none; opacity: 0;
      transition: opacity .3s;
    }
    .toast.show { opacity: 1; }
    .footer { text-align: center; padding: 16px; font-size: .72rem; color: var(--text-secondary); opacity: .7; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔐 人员验证系统</h1>
    <div class="sub">扫码验证 · 实时查询</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-page="verify">✅ 身份验证</div>
    <div class="tab" data-page="admin">⚙️ 名单管理</div>
  </div>

  <div class="main">

    <!-- ===== 验证页 ===== -->
    <div class="page active" id="page-verify">
      <div class="card">
        <form id="verify-form" autocomplete="off">
          <div class="form-group">
            <label for="input-name">姓名</label>
            <input type="text" id="input-name" placeholder="请输入姓名" required autofocus>
          </div>
          <div class="form-group">
            <label for="input-id">工号</label>
            <input type="text" id="input-id" placeholder="请输入工号" required>
          </div>
          <button type="submit" class="btn btn-primary">🔍 验证身份</button>
        </form>

        <div style="text-align:center;margin-top:20px;" id="qrcode-section">
          <p style="font-size:.82rem;color:var(--text-secondary);margin-bottom:10px;">📱 扫描二维码进入验证</p>
          <img src="qrcode.png" alt="QR Code" style="width:180px;height:180px;border-radius:10px;box-shadow:var(--shadow);"
               id="qr-img" onerror="this.style.display='none'">
          <p style="font-size:.72rem;color:var(--text-secondary);margin-top:8px;word-break:break-all;" id="site-url"></p>
        </div>

        <div class="result" id="result">
          <div class="icon" id="result-icon"></div>
          <div class="status" id="result-status"></div>
          <div class="detail" id="result-detail"></div>
        </div>
      </div>
    </div>

    <!-- ===== 管理页 ===== -->
    <div class="page" id="page-admin">
      <!-- 管理员密码 -->
      <div class="card">
        <h3 style="margin-bottom:8px;font-size:.95rem;">🔑 管理员密码</h3>
        <div class="token-setup">
          <input type="password" id="admin-pwd" placeholder="请输入管理密码">
        </div>
        <p class="token-hint">
          输入密码后解锁名单管理功能（密码仅在本机浏览器验证，不会上传）
        </p>
      </div>

      <!-- 添加 -->
      <div class="card">
        <h3 style="margin-bottom:14px;font-size:.95rem;">➕ 添加人员</h3>
        <form id="add-form" autocomplete="off">
          <div class="form-group">
            <label for="add-name">姓名</label>
            <input type="text" id="add-name" placeholder="姓名" required>
          </div>
          <div class="form-group">
            <label for="add-id">工号</label>
            <input type="text" id="add-id" placeholder="工号" required>
          </div>
          <div class="form-group">
            <label for="add-dept">部门（选填）</label>
            <input type="text" id="add-dept" placeholder="部门">
          </div>
          <div class="form-group">
            <label for="add-auth-date">授权日期</label>
            <input type="date" id="add-auth-date" required>
          </div>
          <button type="submit" class="btn btn-success">✅ 添加到名单</button>
        </form>
      </div>

      <!-- 批量导入 -->
      <div class="card">
        <h3 style="margin-bottom:8px;font-size:.95rem;">📋 批量导入</h3>
        <p class="batch-hint">方式一：粘贴文本（每行：<code>姓名,工号,部门,授权日期</code>）</p>
        <textarea class="batch-area" id="batch-input" placeholder="张三,001,技术部,2026/7/14&#10;李四,002,产品部,2026/7/14"></textarea>
        <button class="btn btn-outline" id="btn-batch" style="margin-bottom:12px;">📥 文本导入</button>
        <p class="batch-hint">方式二：上传 Excel 文件（第一行表头：<b>姓名 | 工号 | 部门 | 授权日期</b>，支持 .xlsx / .xls）</p>
        <input type="file" id="excel-file" accept=".xlsx,.xls" style="display:none;">
        <button class="btn btn-outline" id="btn-excel-import">📥 Excel 导入</button>
      </div>

      <!-- 名单 -->
      <div class="card">
        <h3 style="margin-bottom:8px;font-size:.95rem;">📜 当前名单</h3>
        <div class="stats" id="stats">加载中...</div>
        <ul class="person-list" id="person-list"></ul>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-danger btn-sm" id="btn-clear">🗑 清空名单</button>
          <button class="btn btn-outline btn-sm" id="btn-excel-export">📤 导出 Excel</button>
          <button class="btn btn-outline btn-sm" onclick="location.reload()">🔄 刷新名单</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <div class="footer">人员验证系统 v2.0 · Powered by GitHub Pages</div>

  <script>
    // ── 配置 ──
    const REPO_OWNER = 'knightma112358-boop';
    const REPO_NAME = 'verification-system';
    const DATA_PATH = 'data/personnel.json';
    const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`;

    // ── 工具 ──
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    // 显示站点地址
    $('#site-url').textContent = window.location.href;

    function toast(msg) {
      const el = $('#toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function parseAuthorizationDate(value) {
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return new Date(value.getFullYear(), value.getMonth(), value.getDate());
      }

      if (typeof value === 'number' && window.XLSX) {
        const parsed = XLSX.SSF.parse_date_code(value);
        if (parsed) return new Date(parsed.y, parsed.m - 1, parsed.d);
      }

      const match = String(value || '').trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})$/);
      if (!match) return null;
      const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
      if (date.getFullYear() !== Number(match[1]) || date.getMonth() !== Number(match[2]) - 1 || date.getDate() !== Number(match[3])) return null;
      return date;
    }

    function formatAuthorizationDate(value) {
      const date = parseAuthorizationDate(value);
      return date ? `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}` : '';
    }

    function isAuthorizationExpired(value, now = new Date()) {
      const authorizationDate = parseAuthorizationDate(value);
      if (!authorizationDate) return false;
      const anniversary = new Date(authorizationDate);
      anniversary.setFullYear(anniversary.getFullYear() + 1);
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      return today > anniversary;
    }

    // ── 加密的 GitHub Token（AES-256-GCM + PBKDF2，密码 HZWARE）──
    const ENCRYPTED_TOKEN = 'HDjqHVqX951N4YOFVrF+ZBlG2mNlNjXiorzOFMX/4VtWWR4D5FB5+Cyj3G4Rc+fMwy6qS5vddnfBE4Rbu7N7KqrMQOhZAYsYDUhu4Eo35JczWFB0';

    let decryptedToken = null; // 密码验证通过后解密缓存在内存中

    // ── 获取有效 token ──
    function getToken() {
      return decryptedToken;
    }

    // ── 密码解密 Token（Web Crypto API）──
    async function unlockWithPassword(password) {
      try {
        const combined = Uint8Array.from(atob(ENCRYPTED_TOKEN), c => c.charCodeAt(0));
        const salt = combined.slice(0, 16);
        const iv = combined.slice(16, 28);
        const tag = combined.slice(28, 44);
        const ciphertext = combined.slice(44);

        // PBKDF2 派生密钥
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );

        // AES-GCM 解密（将 ciphertext 和 tag 合并）
        const data = new Uint8Array(ciphertext.length + tag.length);
        data.set(ciphertext);
        data.set(tag, ciphertext.length);

        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
        decryptedToken = new TextDecoder().decode(decrypted);
        return true;
      } catch (e) {
        console.error('解密失败:', e);
        return false;
      }
    }

    // 管理员密码输入
    $('#admin-pwd').addEventListener('change', async () => {
      const pwd = $('#admin-pwd').value.trim();
      if (!pwd) return;
      const ok = await unlockWithPassword(pwd);
      if (ok) {
        toast('✅ 密码正确，已解锁管理功能');
        refreshAdminList();
      } else {
        toast('❌ 密码错误');
        decryptedToken = null;
      }
    });
    // 页面加载时尝试自动解密（如果 localStorage 存过密码）
    (() => {
      const saved = localStorage.getItem('admin_pwd');
      if (saved) {
        $('#admin-pwd').value = saved;
        unlockWithPassword(saved).then(ok => {
          if (ok && $('#page-admin').classList.contains('active')) refreshAdminList();
        });
      }
    })();
    // 记住密码（可选）
    $('#admin-pwd').addEventListener('blur', () => {
      const pwd = $('#admin-pwd').value.trim();
      if (pwd && decryptedToken) localStorage.setItem('admin_pwd', pwd);
    });

    // ── Base64 ↔ UTF-8 转换 ──
    function base64ToUtf8(base64) {
      const binary = atob(base64.replace(/\n/g, ''));
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }
    function utf8ToBase64(str) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    // ── 从 GitHub API 读取名单 ──
    async function loadPersonnelFromGitHub() {
      const token = getToken();
      const headers = token ? { Authorization: `Bearer ${token}` } : {};

      try {
        const resp = await fetch(API_BASE, { headers, cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        // GitHub API 返回 base64，需要正确解码 UTF-8
        const json = base64ToUtf8(data.content);
        return { data: JSON.parse(json), sha: data.sha, total: JSON.parse(json).length };
      } catch (err) {
        console.error('加载名单失败:', err);
        return null;
      }
    }

    // ── 从 GitHub Raw 直接读取（即时生效，不走 Pages CDN 缓存）──
    async function loadPersonnelDirect() {
      try {
        // 加时间戳避免浏览器缓存
        const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/master/${DATA_PATH}?t=${Date.now()}`;
        const resp = await fetch(url, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
      } catch (err) {
        console.error('加载名单失败:', err);
        return [];
      }
    }

    // ── 保存名单到 GitHub ──
    async function savePersonnelToGitHub(list, sha) {
      const token = getToken();
      if (!token) { toast('⚠️ 请先输入管理密码'); return false; }

      const content = utf8ToBase64(JSON.stringify(list, null, 2));
      try {
        const resp = await fetch(API_BASE, {
          method: 'PUT',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: '更新人员名单',
            content: content,
            sha: sha
          })
        });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.message || `HTTP ${resp.status}`);
        }
        return true;
      } catch (err) {
        toast('保存失败: ' + err.message);
        return false;
      }
    }

    // ── Tab 切换 ──
    $$('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        $$('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        $$('.page').forEach(p => p.classList.remove('active'));
        $('#page-' + tab.dataset.page).classList.add('active');
        if (tab.dataset.page === 'admin') refreshAdminList();
      });
    });

    // ── 身份验证（直接从同源加载 JSON，无需 token） ──
    $('#verify-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = $('#input-name').value.trim();
      const id = $('#input-id').value.trim();

      if (!name || !id) { toast('请填写姓名和工号'); return; }

      const list = await loadPersonnelDirect();
      const found = list.find(p => p.name.trim() === name && p.id.trim() === id);

      const result = $('#result');
      result.classList.remove('authorized', 'expired', 'unauthorized', 'show');

      if (found) {
        const authorizationDate = formatAuthorizationDate(found.authorizationDate);
        const personDetail = `${found.name} · ${found.id} · ${found.department || '—'}`;
        if (!authorizationDate) {
          result.classList.add('expired', 'show');
          $('#result-icon').textContent = '⚠️';
          $('#result-status').textContent = '授权日期缺失';
          $('#result-detail').textContent = `${personDetail} · 请联系管理员补充授权日期`;
        } else if (isAuthorizationExpired(found.authorizationDate)) {
          result.classList.add('expired', 'show');
          $('#result-icon').textContent = '⏰';
          $('#result-status').textContent = '授权已超期';
          $('#result-detail').textContent = `${personDetail} · 授权日期 ${authorizationDate}`;
        } else {
          result.classList.add('authorized', 'show');
          $('#result-icon').textContent = '✅';
          $('#result-status').textContent = '已授权';
          $('#result-detail').textContent = `${personDetail} · 授权日期 ${authorizationDate}`;
        }
      } else {
        result.classList.add('unauthorized', 'show');
        $('#result-icon').textContent = '🚫';
        $('#result-status').textContent = '未授权';
        $('#result-detail').textContent = '该人员不在授权名单中';
      }
      result.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ── 刷新管理员名单 ──
    async function refreshAdminList() {
      $('#stats').textContent = '加载中...';
      const result = await loadPersonnelFromGitHub();
      if (!result) {
        $('#stats').textContent = '⚠️ 需要设置 Token 才能管理名单';
        $('#person-list').innerHTML = '';
        return;
      }
      const { data, sha } = result;
      $('#stats').innerHTML = `共 <strong>${data.length}</strong> 人在名单中`;
      $('#person-list').innerHTML = data.map(p => `
        <li class="person-item">
          <div class="person-info">
            <div class="p-name">${esc(p.name)}</div>
            <div class="p-meta">工号: ${esc(p.id)} ${p.department ? '· ' + esc(p.department) : ''}</div>
            <div class="p-meta">授权日期: ${esc(formatAuthorizationDate(p.authorizationDate) || '未填写')}${isAuthorizationExpired(p.authorizationDate) ? ' · 已超期' : ''}</div>
          </div>
          <button class="btn btn-danger btn-sm" data-id="${esc(p.id)}">删除</button>
        </li>
      `).join('');

      // 绑定删除按钮
      $$('#person-list .btn-danger').forEach(btn => {
        btn.addEventListener('click', () => deletePerson(btn.dataset.id));
      });

      // 保存 sha 供后续操作
      $('#person-list').dataset.sha = sha;
    }

    // ── 获取当前 sha ──
    async function getCurrentSha() {
      const result = await loadPersonnelFromGitHub();
      return result ? result.sha : null;
    }

    // ── 添加人员 ──
    $('#add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = $('#add-name').value.trim();
      const id = $('#add-id').value.trim();
      const department = $('#add-dept').value.trim();
      const authorizationDate = formatAuthorizationDate($('#add-auth-date').value);

      if (!name || !id || !authorizationDate) { toast('请填写姓名、工号和有效的授权日期'); return; }

      const result = await loadPersonnelFromGitHub();
      if (!result) return;

      const { data: list, sha } = result;
      if (list.find(p => p.id === id)) { toast('⚠️ 该工号已存在'); return; }

      list.push({ id, name, department, authorizationDate });
      const ok = await savePersonnelToGitHub(list, sha);
      if (ok) {
        toast('✅ 添加成功');
        $('#add-form').reset();
        refreshAdminList();
      }
    });

    // ── 删除人员 ──
    async function deletePerson(id) {
      if (!confirm(`确定删除工号 ${id} 的人员吗？`)) return;
      const result = await loadPersonnelFromGitHub();
      if (!result) return;
      const { data: list, sha } = result;
      const newList = list.filter(p => p.id !== id);
      if (newList.length === list.length) { toast('未找到该人员'); return; }
      const ok = await savePersonnelToGitHub(newList, sha);
      if (ok) {
        toast('已删除');
        refreshAdminList();
      }
    }

    // ── 批量导入 ──
    $('#btn-batch').addEventListener('click', async () => {
      const raw = $('#batch-input').value.trim();
      if (!raw) { toast('请粘贴人员数据'); return; }

      const result = await loadPersonnelFromGitHub();
      if (!result) return;

      const { data: list, sha } = result;
      const lines = raw.split('\n').filter(Boolean);
      let added = 0, updated = 0, skipped = 0;

      for (const line of lines) {
        const parts = line.split(',').map(s => s.trim());
        const authorizationDate = formatAuthorizationDate(parts[3]);
        if (!parts[0] || !parts[1] || !authorizationDate) { skipped++; continue; }
        const existing = list.find(p => p.id === parts[1]);
        const person = { name: parts[0], id: parts[1], department: parts[2] || '', authorizationDate };
        if (existing) {
          Object.assign(existing, person);
          updated++;
        } else {
          list.push(person);
          added++;
        }
      }

      const ok = await savePersonnelToGitHub(list, sha);
      if (ok) {
        toast(`导入完成：新增 ${added} 人，更新 ${updated} 人，跳过 ${skipped} 人`);
        $('#batch-input').value = '';
        refreshAdminList();
      }
    });

    // ── 清空名单 ──
    $('#btn-clear').addEventListener('click', async () => {
      if (!confirm('⚠️ 确定清空全部名单？此操作不可恢复！')) return;
      const result = await loadPersonnelFromGitHub();
      if (!result) return;
      const ok = await savePersonnelToGitHub([], result.sha);
      if (ok) { toast('名单已清空'); refreshAdminList(); }
    });

    // ── Excel 导入 ──
    $('#btn-excel-import').addEventListener('click', () => $('#excel-file').click());

    $('#excel-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const result = await loadPersonnelFromGitHub();
      if (!result) { toast('⚠️ 请先输入管理密码'); e.target.value = ''; return; }

      const reader = new FileReader();
      reader.onload = async (evt) => {
        try {
          const wb = XLSX.read(evt.target.result, { type: 'array', cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

          if (rows.length < 2) { toast('Excel 至少需要一行表头 + 一行数据'); return; }

          // 第一行是表头
          const header = rows[0].map(h => String(h || '').trim());
          const nameCol = header.findIndex(h => h.includes('姓名'));
          const idCol = header.findIndex(h => h.includes('工号'));
          const deptCol = header.findIndex(h => h.includes('部门'));
          const authDateCol = header.findIndex(h => h.includes('授权日期'));

          if (nameCol === -1 || idCol === -1 || authDateCol === -1) {
            toast('表头必须包含「姓名」「工号」和「授权日期」列');
            return;
          }

          const { data: list, sha } = result;
          let added = 0, updated = 0, skipped = 0;

          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const name = String(row[nameCol] || '').trim();
            const id = String(row[idCol] || '').trim();
            const dept = deptCol >= 0 ? String(row[deptCol] || '').trim() : '';
            const authorizationDate = formatAuthorizationDate(row[authDateCol]);

            if (!name || !id || !authorizationDate) { skipped++; continue; }
            const existing = list.find(p => p.id === id);
            const person = { id, name, department: dept, authorizationDate };
            if (existing) {
              Object.assign(existing, person);
              updated++;
            } else {
              list.push(person);
              added++;
            }
          }

          if (added === 0 && updated === 0) { toast('Excel 中没有可导入的有效数据'); return; }

          const ok = await savePersonnelToGitHub(list, sha);
          if (ok) {
            toast(`✅ Excel 导入完成：新增 ${added} 人，更新 ${updated} 人，跳过 ${skipped} 人`);
            refreshAdminList();
          }
        } catch (err) {
          toast('❌ Excel 解析失败: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = '';
    });

    // ── Excel 导出 ──
    $('#btn-excel-export').addEventListener('click', async () => {
      const result = await loadPersonnelFromGitHub();
      if (!result) { toast('⚠️ 请先输入管理密码'); return; }

      const { data: list } = result;
      if (list.length === 0) { toast('名单为空，无需导出'); return; }

      // 构建 Excel 数据
      const rows = [['姓名', '工号', '部门', '授权日期']];
      for (const p of list) rows.push([p.name, p.id, p.department || '', formatAuthorizationDate(p.authorizationDate)]);

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(rows);

      // 设置列宽
      ws['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 15 }];

      XLSX.utils.book_append_sheet(wb, ws, '人员名单');
      XLSX.writeFile(wb, `人员名单_${new Date().toISOString().slice(0, 10)}.xlsx`);
      toast('📤 导出成功');
    });

    // ── 回车触发验证 ──
    $('#input-id').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); $('#verify-form').dispatchEvent(new Event('submit')); }
    });
  </script>
</body>
</html>
